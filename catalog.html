<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#f0f1f4;--s1:#ffffff;--s2:#f5f6f9;--s3:#e8eaed;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.18);
  --text:#111111;--muted:#888;--muted2:#555;
  --accent:#c8f03c;--accent2:#9fc02a;--accent-dark:#4a7a00;--qc:#0284c7;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1400px;margin:0 auto;padding:0 24px;height:58px;display:flex;align-items:center;gap:24px}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;color:var(--accent-dark);text-decoration:none;flex-shrink:0}
.nav-cats{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none}
.nav-cats::-webkit-scrollbar{display:none}
.nav-cat{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);text-decoration:none;padding:6px 12px;border-radius:6px;transition:all .15s;white-space:nowrap;border:1px solid transparent}
.nav-cat:hover{color:var(--text);background:var(--s2);border-color:var(--border)}
.nav-cat.active{color:var(--accent-dark);border-color:rgba(74,122,0,.25);background:rgba(74,122,0,.07)}
.nav-right{flex-shrink:0}
.nav-link{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);text-decoration:none;padding:6px 12px;border-radius:6px;border:1px solid var(--border);transition:all .15s}
.nav-link:hover{color:var(--accent-dark);border-color:rgba(74,122,0,.25)}
.page{max-width:1400px;margin:0 auto;padding:24px;display:flex;gap:20px;align-items:flex-start}

/* ── CATEGORY TAB BAR (uufinds style) ── */
.cat-bar{position:sticky;top:58px;z-index:150;background:rgba(255,255,255,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.cat-bar-inner{display:flex;gap:6px;overflow-x:auto;padding:10px 24px;scrollbar-width:none;max-width:1400px;margin:0 auto}
.cat-bar-inner::-webkit-scrollbar{display:none}
/* ── SEARCH BAR ── */
.search-section{background:var(--bg);padding:14px 24px;border-bottom:1px solid var(--border)}
.search-section-inner{max-width:1400px;margin:0 auto}
.site-search-bar{display:flex;background:#fff;border:1.5px solid var(--border2);border-radius:10px;overflow:hidden;transition:border-color .2s,box-shadow .2s;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.site-search-bar:focus-within{border-color:var(--accent-dark);box-shadow:0 2px 14px rgba(74,122,0,.15)}
#catalog-search{flex:1;border:none;outline:none;font-family:'DM Sans','Noto Sans JP',sans-serif;font-size:14px;font-weight:500;color:var(--text);background:transparent;padding:11px 16px;min-width:0}
#catalog-search::placeholder{color:var(--muted)}
.site-search-btn{padding:0 18px;background:var(--accent);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:800;color:#111;display:flex;align-items:center;gap:6px;transition:background .15s;flex-shrink:0;white-space:nowrap}
.site-search-btn:hover{background:var(--accent2)}
.search-convert-hint{font-size:11px;color:var(--accent-dark);font-weight:700;margin-top:6px;display:none}
.cat-pill{font-family:'DM Sans','Noto Sans JP',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);padding:7px 16px;border-radius:999px;border:1px solid var(--border);white-space:nowrap;cursor:pointer;transition:all .12s;background:transparent;flex-shrink:0}
.cat-pill:hover{border-color:var(--border2);color:var(--text);background:var(--s2)}
.cat-pill.active{background:var(--accent);color:#111;border-color:var(--accent);font-weight:800}
/* BRAND BAR */
.brand-bar{background:var(--bg);border-bottom:1px solid var(--border)}
.brand-bar-inner{display:flex;gap:6px;overflow-x:auto;padding:7px 24px;scrollbar-width:none;max-width:1400px;margin:0 auto}
.brand-bar-inner::-webkit-scrollbar{display:none}
.brand-pill{font-size:11px;font-weight:700;letter-spacing:.3px;color:var(--muted2);padding:5px 14px;border-radius:999px;border:1px solid var(--border);white-space:nowrap;cursor:pointer;transition:all .12s;background:var(--s1);flex-shrink:0}
.brand-pill:hover{border-color:var(--border2);color:var(--text);background:var(--s2)}
.brand-pill.active{background:var(--accent-dark);color:#fff;border-color:var(--accent-dark);font-weight:800}

/* ── SIDEBAR ── */
.sidebar{width:210px;flex-shrink:0;position:sticky;top:112px;display:flex;flex-direction:column;gap:4px;max-height:calc(100vh - 120px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--s3) transparent}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.sidebar-block{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.sb-title{font-size:10px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid var(--border)}
.sb-search{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans','Noto Sans JP',sans-serif;font-size:13px;font-weight:600;padding:8px 11px;outline:none;transition:border-color .2s}
.sb-search:focus{border-color:var(--accent)}
.sb-search::placeholder{color:var(--muted)}
.filter-list{display:flex;flex-direction:column;gap:1px}
.f-item{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:7px;cursor:pointer;transition:background .12s}
.f-item:hover{background:var(--s2)}
.f-item.active{background:rgba(200,240,60,.07)}
.f-cb{appearance:none;width:15px;height:15px;border:2px solid var(--muted);border-radius:3px;flex-shrink:0;cursor:pointer;position:relative;transition:all .15s}
.f-cb:checked{background:var(--accent);border-color:var(--accent)}
.f-cb:checked::after{content:'✓';position:absolute;top:-3px;left:1px;font-size:11px;color:#111;font-weight:900}
.f-label{font-size:13px;font-weight:600;color:var(--text);flex:1;line-height:1.2}
.f-count{font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap}
.f-item.active .f-label{color:var(--accent-dark)}
#brand-list{max-height:280px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--s3) transparent}
#brand-list::-webkit-scrollbar{width:3px}
#brand-list::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.btn-reset{width:100%;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--muted2);font-family:'DM Sans','Noto Sans JP',sans-serif;font-size:12px;font-weight:700;padding:8px;cursor:pointer;transition:all .15s;margin-top:8px}
.btn-reset:hover{border-color:var(--border2);color:var(--text)}

/* ── MAIN ── */
.main{flex:1;min-width:0}
.result-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.result-count{font-size:13px;font-weight:700;color:var(--muted2)}
.result-count span{color:var(--accent-dark);font-size:16px}
.cat-title-bar{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:3px;margin-bottom:14px;color:var(--text)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.card{background:var(--s1);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .18s,transform .18s,box-shadow .18s;box-shadow:0 1px 4px rgba(0,0,0,.07),0 2px 10px rgba(0,0,0,.04)}
.card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 6px 24px rgba(0,0,0,.12),0 2px 6px rgba(0,0,0,.06)}
.card-img{width:100%;aspect-ratio:1/1;object-fit:cover;background:var(--s2);display:block;flex-shrink:0}
.card-noimag{width:100%;aspect-ratio:1/1;background:var(--s2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-noimag span{font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;font-weight:700}
.card-body{padding:12px;flex:1;display:flex;flex-direction:column;gap:7px}
.card-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;padding:3px 8px;border-radius:999px;border:1px solid var(--border)}
.tag-brand{background:rgba(74,122,0,.08);color:var(--accent-dark);border-color:rgba(74,122,0,.2)}
.tag-brand:hover{background:rgba(74,122,0,.16)}
.tag-type{background:rgba(0,0,0,.05);color:var(--muted2);border-color:rgba(0,0,0,.09)}
.tag-type:hover{background:rgba(0,0,0,.1)}
.card-title{font-size:13px;font-weight:600;color:var(--muted2);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.card-price{font-size:17px;font-weight:800;color:var(--accent-dark);letter-spacing:.3px;display:flex;align-items:baseline;gap:5px}
.card-price-cny{font-size:11px;font-weight:600;color:var(--muted);font-family:'DM Sans',sans-serif;letter-spacing:0}
.card-actions{display:flex;gap:5px;margin-top:2px}
.btn-buy{flex:1;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.5px;color:#111;background:var(--accent);padding:9px 8px;border-radius:7px;text-decoration:none;transition:background .15s}
.btn-buy:hover{background:var(--accent2)}
.btn-qc{display:flex;align-items:center;justify-content:center;gap:3px;font-size:11px;font-weight:700;color:var(--qc);background:rgba(2,132,199,.08);border:1px solid rgba(2,132,199,.22);padding:9px 11px;border-radius:7px;text-decoration:none;transition:all .15s;flex-shrink:0}
.btn-qc:hover{background:rgba(2,132,199,.16)}
.btn-qc svg{width:12px;height:12px}
/* ── ACTIVE FILTER CHIPS ── */
.filter-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.filter-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:.3px;color:#0a0a0a;background:var(--accent);padding:4px 8px 4px 11px;border-radius:999px;cursor:pointer;transition:background .12s;white-space:nowrap}
.filter-chip:hover{background:var(--accent2)}
.filter-chip-x{font-size:14px;font-weight:900;line-height:1;margin-left:1px}
.empty{text-align:center;padding:60px;color:var(--muted);font-size:14px;font-weight:700}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:13px;color:var(--muted2);letter-spacing:1px;font-weight:700}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card{animation:fadeIn .18s ease both}

/* ── MODEL GROUP CARD ── */
.model-group{grid-column:1/-1;margin-bottom:4px}
.model-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s;display:flex;gap:0;position:relative}
.model-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.model-card-img{width:140px;min-width:140px;aspect-ratio:4/3;object-fit:cover;background:var(--s2);flex-shrink:0}
.model-card-noimag{width:140px;min-width:140px;aspect-ratio:4/3;background:var(--s2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.model-card-noimag span{font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
.model-card-body{flex:1;padding:14px;display:flex;flex-direction:column;gap:7px;justify-content:center}
.model-card-tags{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.model-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--text);line-height:1}
.model-variant-count{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--accent-dark);background:rgba(74,122,0,.08);border:1px solid rgba(74,122,0,.18);padding:3px 10px;border-radius:999px}
.model-expand-btn{position:absolute;top:12px;right:12px;font-size:18px;color:var(--muted);transition:transform .2s;pointer-events:none}
.model-card.expanded .model-expand-btn{transform:rotate(180deg);color:var(--accent-dark)}
.model-variants{display:none;padding:12px 0 4px;animation:fadeIn .2s ease both}
.model-variants.open{display:block}

@media(max-width:768px){
  .model-card-img,.model-card-noimag{width:100px;min-width:100px}
  .model-name{font-size:18px}
}
footer{text-align:center;padding:28px 24px;font-size:11px;color:var(--muted);border-top:1px solid var(--border)}
footer a{color:var(--accent);text-decoration:none}
@media(max-width:768px){
  .sidebar{display:none}
  .page{padding:10px;gap:0}
  .grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .nav-right{display:none}
  .mobile-filter-btn{display:flex}
  .result-bar{flex-direction:column;gap:8px;align-items:flex-start}
  .card-title{font-size:12px}
  .card-price{font-size:15px}
  .btn-buy{font-size:13px;padding:8px 6px}
  .btn-qc{padding:8px 9px}
  .cat-bar-inner{padding:8px 10px}
  .cat-pill{font-size:10px;padding:6px 12px}
  .brand-bar-inner{padding:6px 10px}
  .brand-pill{font-size:10px;padding:4px 11px}
}
@media(min-width:769px){
  .mobile-filter-btn{display:none}
  .drawer-overlay{display:none!important}
  .drawer{display:none!important}
}
/* ── DRAWER（モバイル用） ── */
.mobile-filter-btn{
  width:100%;margin-bottom:12px;
  background:var(--s1);border:1px solid var(--border);border-radius:9px;
  color:var(--text);font-family:'DM Sans','Noto Sans JP',sans-serif;font-size:13px;font-weight:700;
  padding:11px 16px;cursor:pointer;display:none;align-items:center;justify-content:space-between;
  transition:border-color .15s;
}
@media(max-width:768px){.mobile-filter-btn{display:flex!important}}
.mobile-filter-btn:hover{border-color:var(--border2)}
.drawer-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;left:0;top:0;bottom:0;width:280px;
  background:#ffffff;z-index:301;overflow-y:auto;
  transform:translateX(-100%);transition:transform .25s ease;
  padding:20px 16px;display:flex;flex-direction:column;gap:4px;
}
.drawer.open{transform:translateX(0)}
.drawer-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.drawer-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--accent-dark)}
.drawer-close{background:none;border:none;color:var(--muted2);font-size:22px;cursor:pointer;padding:4px}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="/">PANDORA</a>
    <div class="nav-cats" id="nav-cats"></div>
    <div class="nav-right">
      <a class="nav-link" href="/converter.html">🔗 リンク変換</a>
    </div>
  </div>
</nav>

<div id="loading"><div class="spinner"></div><p>読み込み中...</p></div>

<div id="app" style="display:none">
  <!-- 検索バー -->
  <div class="search-section">
    <div class="search-section-inner">
      <div class="site-search-bar">
        <input id="catalog-search" type="text" autocomplete="off"
          placeholder="商品名で検索、またはWeidian / Taobao / 1688 のリンクをKakobuyリンクに変換..."
          oninput="onCatalogSearchInput(this.value)"
          onkeydown="if(event.key==='Enter')doCatalogSearch()">
        <button class="site-search-btn" onclick="doCatalogSearch()">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10" y1="10" x2="14" y2="14"/></svg>
          検索 / 変換
        </button>
      </div>
      <div class="search-convert-hint" id="catalog-search-hint">↵ Enterでリンクを変換してKakobuyで開く</div>
    </div>
  </div>
  <!-- カテゴリタブバー (uufinds style) -->
  <div class="cat-bar">
    <div class="cat-bar-inner" id="cat-pills"></div>
  </div>
  <!-- ブランドクイックチップ -->
  <div class="brand-bar">
    <div class="brand-bar-inner" id="brand-pills"></div>
  </div>

  <!-- モバイルフィルターボタン -->
  <div style="max-width:1400px;margin:0 auto;padding:10px 14px 0">
    <button class="mobile-filter-btn" onclick="openDrawer()">
      <span>🏷 ブランドで絞り込む</span>

      <span class="drawer-title">絞り込み</span>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div id="cat-list-mobile" style="display:none"></div>
    <div class="sidebar-block" style="background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:14px">

      <div class="filter-list" id="brand-list-mobile"></div>
    </div>
    <button class="btn-reset" onclick="resetFilters()">リセット</button>
    <button style="width:100%;background:var(--accent);border:none;border-radius:8px;color:#0a0a0a;font-family:'DM Sans','Noto Sans JP',sans-serif;font-size:13px;font-weight:800;padding:11px;cursor:pointer;margin-top:6px" onclick="closeDrawer()">結果を見る（<span id="drawer-count">0</span>件）</button>
  </div>

  <div class="page">
    <div id="cat-list" style="display:none"></div>
    <input type="hidden" id="search">
    <aside class="sidebar">
      <div class="sidebar-block">
        <div class="sb-title">ブランド</div>

    <div class="main">

          <option value="default">並び順: 標準</option>
          <option value="price-asc">価格: 安い順</option>
          <option value="price-desc">価格: 高い順</option>

      <div class="cat-title-bar" id="cat-title" style="display:none"></div>
      <div class="grid" id="grid"></div>
    </div>
  </div>
</div>

<footer>PANDORA &nbsp;·&nbsp; <a href="https://www.kakobuy.com/?affcode=a235412" target="_blank">Kakobuy</a></footer>

<script>
const CAT_ORDER=["HOODIES","T-SHIRTS","SHORTS","PANTS","JACKETS","SWEATERS","TOPS","SHIRTS","SNEAKERS","BAGS","ACCESSORIES"];
const urlCat=new URLSearchParams(location.search).get('cat')||'all';
let ALL=[],selCats=new Set(urlCat!=='all'?[urlCat]:[]),selBrands=new Set(),allCats=[];
const PAGE_SIZE=48;let pageItems=[];let renderedCount=0;

function cleanTitle(r){
  let s=String(r).trim();
  s=s.replace(/^[+\s]*[¥￥]?\s*\d[\d,.]*\s*[¥￥]?\s*(?:cny|rmb|usd|yuan|元)?\s*/i,'');
  s=s.replace(/^(?:ON SALE\s*)?[¥￥][\d,.\s]+(?:cny|usd)?\s*/i,'');
  const stripped=s
    .replace(/[（【\[][^）\]】]*[）\]】]/g,'')
    .replace(/[一-鿿㐀-䶿]{2,}[-￿]*/g,'')
    .replace(/[¥￥][\d,]+|[\d,]+[¥￥]/g,'')
    .replace(/\s*[｜|]\s*/g,' ')
    .replace(/\s{2,}/g,' ').replace(/^[-\s+]+|[-\s+]+$/g,'').trim();
  if(stripped.length>2)return stripped;
  const fallback=s.replace(/[一-鿿㐀-䶿]{2,}[-￿]*/g,'').replace(/\s{2,}/g,' ').trim();
  return fallback||r.slice(0,50);
}
function extractJPY(p){const j=p.price_jpy;if(j&&!['undefined','null',''].includes(String(j).trim())){const n=parseInt(String(j).replace(/[^0-9]/g,''));if(!isNaN(n))return'¥'+n.toLocaleString()}const m=String(p.title||'').match(/[¥￥]([\d,]+)\s*cny/i);if(m)return'¥'+Math.round(parseInt(m[1].replace(',',''))*21).toLocaleString();return''}
function extractCNY(p){const c=p.price_cny;if(c&&!['undefined','null',''].includes(String(c).trim())){const n=parseFloat(String(c));if(!isNaN(n)&&n>0)return Math.round(n)+'元'}return''}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function isShopLink(s){return/(weidian\.com|taobao\.com|1688\.com|jd\.com|shop\d+\.v\.weidian)/i.test(s)}
function toKakobuyLink(raw){let u=raw.trim();if(!/^https?:\/\//i.test(u))u='https://'+u;return'https://www.kakobuy.com/item/details?url='+encodeURIComponent(u)+'&affcode=a235412'}
function onCatalogSearchInput(val){
  const hint=document.getElementById('catalog-search-hint');
  const s=document.getElementById('search');
  if(isShopLink(val)){if(hint)hint.style.display='block';return}
  if(hint)hint.style.display='none';
  if(s){s.value=val;applyFilters()}
}
function doCatalogSearch(){
  const val=(document.getElementById('catalog-search')?.value||'').trim();
  if(!val)return;
  if(isShopLink(val)){window.open(toKakobuyLink(val),'_blank','noopener');return}
  const s=document.getElementById('search');if(s){s.value=val;applyFilters()}
}
function getFiltered(){
  const q=(document.getElementById('search')?.value||'').toLowerCase();
  let items=ALL.filter(p=>{
    if(selCats.size&&!selCats.has(p.type))return false;
    if(selBrands.size&&!selBrands.has(p.brand||''))return false;
    if(q&&!(cleanTitle(p.title)+' '+p.type+' '+(p.brand||'')).toLowerCase().includes(q))return false;
    return true;
  });
  const sort=(document.getElementById('sort-select')||{value:'default'}).value;
  if(sort==='price-asc'){
    items=[...items].sort((a,b)=>{const pa=Number(a.price_jpy)||999999,pb=Number(b.price_jpy)||999999;return pa-pb;});
  }else if(sort==='price-desc'){
    items=[...items].sort((a,b)=>{const pa=Number(a.price_jpy)||0,pb=Number(b.price_jpy)||0;return pb-pa;});
  }else if(sort==='has-price'){
    items=[...items].sort((a,b)=>(b.price_jpy?1:0)-(a.price_jpy?1:0));
  }
  return items;
}

function buildCatList(){
  const allTypes=new Set(ALL.map(p=>p.type).filter(Boolean));
  allCats=[...CAT_ORDER.filter(c=>allTypes.has(c)),...[...allTypes].filter(c=>!CAT_ORDER.includes(c)).sort()];
  buildCatBar();
}

function buildCatBar(){
  const el=document.getElementById('cat-pills');if(!el)return;
  el.innerHTML='';
  const all=document.createElement('button');all.className='cat-pill'+(selCats.size===0?' active':'');
  all.textContent='ALL';
  all.addEventListener('click',()=>{
    selCats.clear();selBrands.clear();
    history.replaceState(null,'','/catalog.html');
    buildCatBar();buildBrandList();buildBrandBar();updateTitle();applyFilters();
  });
  el.appendChild(all);
  allCats.forEach(cat=>{
    const pill=document.createElement('button');pill.className='cat-pill'+(selCats.has(cat)?' active':'');
    pill.textContent=cat;
    pill.addEventListener('click',()=>{
      if(selCats.has(cat)){selCats.delete(cat);}else{selCats.clear();selCats.add(cat);}
      selBrands.clear();
      const c=[...selCats];
      history.replaceState(null,'',c.length===1?`/catalog.html?cat=${encodeURIComponent(c[0])}`:'/catalog.html');
      if(!loadedFull){
        ensureFullData().then(()=>{buildCatBar();buildBrandList();buildBrandBar();updateTitle();applyFilters();});
      }else{
        buildCatBar();buildBrandList();buildBrandBar();updateTitle();applyFilters();
      }
    });
    el.appendChild(pill);
  });
}

function buildBrandList(){
  const src=selCats.size?ALL.filter(p=>selCats.has(p.type)):ALL;
  const brands=[...new Set(src.map(p=>p.brand).filter(Boolean))].sort();
  const el=document.getElementById('brand-list');el.innerHTML='';
  brands.forEach(brand=>{
    const cnt=src.filter(p=>p.brand===brand).length;
    const lbl=document.createElement('label');
    lbl.className='f-item'+(selBrands.has(brand)?' active':'');
    lbl.innerHTML=`<input type="checkbox" class="f-cb" ${selBrands.has(brand)?'checked':''} onchange="toggleBrand(this.parentElement.dataset.brand,this)"><span class="f-label">${esc(brand)}</span><span class="f-count">${cnt}</span>`;
    lbl.dataset.brand=brand;
    el.appendChild(lbl);
  });
}

function toggleCat(cat,cb){
  cb.checked?selCats.add(cat):selCats.delete(cat);
  selBrands.clear();
  const c=[...selCats];
  history.replaceState(null,'',c.length===1?`/catalog.html?cat=${encodeURIComponent(c[0])}`:'/catalog.html');
  if(!loadedFull){
    ensureFullData().then(()=>{buildCatBar();buildBrandList();buildBrandBar();updateTitle();applyFilters();});
  }else{
    buildCatBar();buildBrandList();buildBrandBar();updateTitle();applyFilters();
  }
}
function toggleBrand(brand,cb){cb.checked?selBrands.add(brand):selBrands.delete(brand);buildBrandBar();applyFilters()}
function buildBrandBar(){
  const el=document.getElementById('brand-pills');if(!el)return;
  const src=selCats.size?ALL.filter(p=>selCats.has(p.type)):ALL;
  const counts={};src.forEach(p=>{if(p.brand)counts[p.brand]=(counts[p.brand]||0)+1;});
  const topBrands=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,15).map(e=>e[0]);
  el.innerHTML='';
  topBrands.forEach(brand=>{
    const pill=document.createElement('button');
    pill.className='brand-pill'+(selBrands.size===1&&selBrands.has(brand)?' active':'');
    pill.textContent=brand;
    pill.addEventListener('click',()=>{
      if(selBrands.size===1&&selBrands.has(brand)){selBrands.clear();}
      else{selBrands.clear();selBrands.add(brand);}
      buildBrandBar();buildBrandList();applyFilters();
    });
    el.appendChild(pill);
  });
}

function updateTitle(){
  const el=document.getElementById('cat-title');
  if(selCats.size===1){el.textContent=[...selCats][0];el.style.display='block'}
  else el.style.display='none';
}

function makeVariantCard(p, i) {
  const title=cleanTitle(p.title),price=extractJPY(p),cny=extractCNY(p);
  const buyLink=p.kakobuy||p.purchase||'#',qcLink=p.yupoo||'#';
  const brand=p.brand||'',type=p.type||'';
  const card=document.createElement('div');card.className='card';card.style.animationDelay=Math.min(i,24)*.018+'s';
  const imgHtml=p.image&&p.image!=='null'&&p.image.length>4
    ?`<img class="card-img" src="${esc(p.image)}" alt="${esc(title)}" loading="lazy" onerror="this.outerHTML='<div class=card-noimag><span>NO IMAGE</span></div>'">`
    :`<div class="card-noimag"><span>NO IMAGE</span></div>`;
  card.innerHTML=`${imgHtml}<div class="card-body"><div class="card-tags">${brand?`<span class="tag tag-brand" style="cursor:pointer" title="${esc(brand)}で絞り込む">${esc(brand)}</span>`:''} ${type?`<span class="tag tag-type" style="cursor:pointer" title="${esc(type)}で絞り込む">${esc(type)}</span>`:''}</div><div class="card-title">${esc(title)}</div>${price?`<div class="card-price">${price}${cny?`<span class="card-price-cny">/ ${cny}</span>`:''}</div>`:''}<div class="card-actions"><a class="btn-buy" href="${esc(buyLink)}" target="_blank" rel="noopener">Kakobuyで見る →</a><a class="btn-qc" href="${esc(qcLink)}" target="_blank" rel="noopener"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10" y1="10" x2="14" y2="14"/></svg>QC</a></div></div>`;
  if(brand){const bt=card.querySelector('.tag-brand');if(bt){bt.addEventListener('click',e=>{e.stopPropagation();selBrands.clear();selBrands.add(brand);buildBrandList();applyFilters();});}}
  if(type){const tt=card.querySelector('.tag-type');if(tt){tt.addEventListener('click',e=>{e.stopPropagation();selCats.clear();selCats.add(type);selBrands.clear();buildCatBar();buildBrandList();updateTitle();applyFilters();});}}
  return card;
}

}

function makeModelGroupCard(modelName, items) {
  const rep = items[0];
  const brand = rep.brand || '';
  const imgHtml = rep.image && rep.image !== 'null' && rep.image.length > 4
    ? `<img class="model-card-img" src="${esc(rep.image)}" alt="${esc(modelName)}" loading="lazy" onerror="this.outerHTML='<div class=model-card-noimag><span>NO IMAGE</span></div>'">`
    : `<div class="model-card-noimag"><span>NO IMAGE</span></div>`;

  // バッチでグループ化
  const batches = new Map();
  const noBatch = [];
  items.forEach(p => {
    const key = p.batch || '__none__';
    if (!batches.has(key)) batches.set(key, []);
    batches.get(key).push(p);
  });
  const hasBatches = batches.size > 1 || (batches.size === 1 && !batches.has('__none__'));

  const wrap = document.createElement('div');
  wrap.className = 'model-group';

  // モデルカード（ヘッダー）
  const card = document.createElement('div');
  card.className = 'model-card';
  card.innerHTML = `
    ${imgHtml}
    <div class="model-card-body">
      <div class="model-card-tags">
        ${brand ? `<span class="tag tag-brand">${esc(brand)}</span>` : ''}
        ${hasBatches ? `<span class="tag" style="background:rgba(200,240,60,.08);color:var(--accent);border-color:rgba(200,240,60,.2)">${batches.size} バッチ</span>` : ''}
      </div>
      <div class="model-name">${esc(modelName)}</div>
      <div class="model-variant-count">▼ ${items.length} バリアント</div>
    </div>
    <span class="model-expand-btn">▾</span>`;

  // バリアントエリア
  const variantWrap = document.createElement('div');
  variantWrap.className = 'model-variants';

  if (hasBatches) {
    // タブバー
    const tabBar = document.createElement('div');
    tabBar.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;padding:10px 0 12px;border-bottom:1px solid var(--border);margin-bottom:12px';

    // グリッドコンテナ
    const gridWrap = document.createElement('div');
    gridWrap.className = 'grid';

    let activeTab = null;

    batches.forEach((bItems, batchKey) => {
      const displayName = batchKey === '__none__' ? 'その他' : batchKey;
      const tab = document.createElement('button');
      tab.style.cssText = 'font-family:"Syne",sans-serif;font-size:11px;font-weight:700;padding:5px 14px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted2);cursor:pointer;transition:all .15s;white-space:nowrap';
      tab.textContent = `${displayName}  ${bItems.length}`;
      tab.dataset.batch = batchKey;

      tab.addEventListener('mouseenter', () => { if (!tab.classList.contains('active')) tab.style.borderColor = 'var(--border2)'; });
      tab.addEventListener('mouseleave', () => { if (!tab.classList.contains('active')) tab.style.borderColor = 'var(--border)'; });

      tab.addEventListener('click', (e) => {
        e.stopPropagation();
        // 全タブをリセット
        tabBar.querySelectorAll('button').forEach(t => {
          t.classList.remove('active');
          t.style.cssText = 'font-family:"Syne",sans-serif;font-size:11px;font-weight:700;padding:5px 14px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted2);cursor:pointer;transition:all .15s;white-space:nowrap';
        });
        // アクティブタブをスタイル
        tab.classList.add('active');
        tab.style.cssText = 'font-family:"Syne",sans-serif;font-size:11px;font-weight:700;padding:5px 14px;border-radius:999px;border:1px solid var(--accent);background:rgba(200,240,60,.12);color:var(--accent);cursor:pointer;transition:all .15s;white-space:nowrap';
        // グリッドを差し替え
        gridWrap.innerHTML = '';
        bItems.forEach((p, i) => gridWrap.appendChild(makeVariantCard(p, i)));
      });

      // 最初のタブをデフォルト選択
      if (!activeTab) {
        activeTab = tab;
        tab.classList.add('active');
        tab.style.cssText = 'font-family:"Syne",sans-serif;font-size:11px;font-weight:700;padding:5px 14px;border-radius:999px;border:1px solid var(--accent);background:rgba(200,240,60,.12);color:var(--accent);cursor:pointer;transition:all .15s;white-space:nowrap';
        bItems.forEach((p, i) => gridWrap.appendChild(makeVariantCard(p, i)));
      }

      tabBar.appendChild(tab);
    });

    variantWrap.appendChild(tabBar);
    variantWrap.appendChild(gridWrap);
  } else {
    // バッチなし → フラットグリッド
    const gridWrap = document.createElement('div');
    gridWrap.className = 'grid';
    items.forEach((p, i) => gridWrap.appendChild(makeVariantCard(p, i)));
    variantWrap.appendChild(gridWrap);
  }

  card.addEventListener('click', () => {
    const open = variantWrap.classList.toggle('open');
    card.classList.toggle('expanded', open);
    const countEl = card.querySelector('.model-variant-count');
    countEl.textContent = (open ? '▲ ' : '▼ ') + items.length + ' バリアント';
    card.style.borderColor = open ? 'var(--accent)' : '';
  });

  wrap.appendChild(card);
  wrap.appendChild(variantWrap);
  return wrap;
}

function renderChips(){
  const el=document.getElementById('active-filters');
  if(!el)return;
  el.innerHTML='';
  selCats.forEach(c=>{
    const chip=document.createElement('span');chip.className='filter-chip';
    chip.innerHTML=`<span>${esc(c)}</span><span class="filter-chip-x">×</span>`;
    chip.addEventListener('click',()=>{selCats.delete(c);buildCatList();buildBrandList();updateTitle();applyFilters();});
    el.appendChild(chip);
  });
  selBrands.forEach(b=>{
    const chip=document.createElement('span');chip.className='filter-chip';
    chip.innerHTML=`<span>${esc(b)}</span><span class="filter-chip-x">×</span>`;
    chip.addEventListener('click',()=>{selBrands.delete(b);buildBrandList();applyFilters();});
    el.appendChild(chip);
  });
}

function renderToGrid(items,grid){
  const modelGroups=new Map(),noModel=[];
  items.forEach(p=>{if(p.model){if(!modelGroups.has(p.model))modelGroups.set(p.model,[]);modelGroups.get(p.model).push(p);}else{noModel.push(p);}});
  modelGroups.forEach((gItems,name)=>grid.appendChild(makeModelGroupCard(name,gItems)));
  noModel.forEach((p,i)=>grid.appendChild(makeVariantCard(p,i)));
}
function applyFilters(){
  renderChips();
  pageItems=getFiltered();renderedCount=0;
  const old=document.getElementById('load-more-wrap');if(old)old.remove();
  document.getElementById('count').textContent=pageItems.length;
  const grid=document.getElementById('grid');grid.innerHTML='';
  if(!pageItems.length){grid.innerHTML='<div class="empty"><p style="font-size:22px;margin-bottom:8px">🔍</p><p style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px">条件に一致する商品が見つかりませんでした</p><p style="font-size:12px;color:var(--muted);margin-bottom:18px">キーワードを変えるか、フィルターをリセットしてみてください</p><button onclick="resetFilters()" style="background:var(--accent);border:none;border-radius:8px;color:#111;font-family:\'DM Sans\',sans-serif;font-size:13px;font-weight:800;padding:10px 24px;cursor:pointer">フィルターをリセット</button></div>';return}
  appendPage(grid);
}
function appendPage(grid){
  const batch=pageItems.slice(renderedCount,renderedCount+PAGE_SIZE);
  if(!batch.length)return;
  renderToGrid(batch,grid);
  renderedCount+=batch.length;
  syncLoadMoreBtn();
}
let scrollObs=null;
function loadMoreItems(){appendPage(document.getElementById('grid'));}
function syncLoadMoreBtn(){
  if(scrollObs){scrollObs.disconnect();scrollObs=null;}
  const w=document.getElementById('load-more-wrap');if(w)w.remove();
  if(renderedCount>=pageItems.length)return;
  const sentinel=document.createElement('div');sentinel.id='load-more-wrap';
  sentinel.style.cssText='height:80px;display:flex;align-items:center;justify-content:center';
  sentinel.innerHTML='<div class="spinner"></div>';
  document.getElementById('grid').insertAdjacentElement('afterend',sentinel);
  scrollObs=new IntersectionObserver(entries=>{if(entries[0].isIntersecting)loadMoreItems();},{rootMargin:'300px'});
  scrollObs.observe(sentinel);
}

function resetFilters(){selCats.clear();selBrands.clear();document.getElementById('search').value='';const cs=document.getElementById('catalog-search');if(cs)cs.value='';const ch=document.getElementById('catalog-search-hint');if(ch)ch.style.display='none';history.replaceState(null,'','/catalog.html');buildCatBar();buildBrandList();buildBrandBar();updateTitle();applyFilters()}

function buildNav(cats){
  const nc=document.getElementById('nav-cats');
  cats.forEach(cat=>{
    const a=document.createElement('a');
    a.className='nav-cat'+(selCats.has(cat)?' active':'');
    a.href=`/catalog.html?cat=${encodeURIComponent(cat)}`;
    a.textContent=cat;nc.appendChild(a);
  });
}

// カテゴリslugマップ（type名 → ファイル名）
const CAT_SLUG = {};
CAT_ORDER.forEach(t => { CAT_SLUG[t] = t.toLowerCase().replace(/-/g,'_').replace(/ /g,'_'); });

let loadedFull = false;  // products.json 全件フェッチ済み

async function fetchCat(type) {
  const slug = CAT_SLUG[type] || type.toLowerCase().replace(/-/g,'_').replace(/ /g,'_');
  const res = await fetch(`./data/cat/${slug}.json`);
  if (!res.ok) throw new Error(`cat/${slug}.json not found`);
  const data = await res.json();
  return data.products || [];
}

async function ensureFullData() {
  if (loadedFull) return;
  const res = await fetch('./products.json');
  if (!res.ok) throw new Error();
  const data = await res.json();
  ALL = data.products || [];
  loadedFull = true;
}

async function init(){
  try{
    const params = new URLSearchParams(location.search);
    const catParam = params.get('cat');

    if (catParam) {
      // ?cat=TYPE のとき: そのカテゴリのJSONのみロード（高速）
      try {
        ALL = await fetchCat(catParam);
        selCats.add(catParam);
      } catch {
        // フォールバック: 全件ロード
        await ensureFullData();
        selCats.add(catParam);
      }
    } else {
      // 全件ビュー: 通常通り products.json をロード
      await ensureFullData();
    }

    const allTypes=new Set(ALL.map(p=>p.type).filter(Boolean));
    const cats=[...CAT_ORDER.filter(c=>allTypes.has(c)),...[...allTypes].filter(c=>!CAT_ORDER.includes(c)).sort()];
    buildNav(cats);buildCatList();buildBrandList();buildBrandBar();updateTitle();applyFilters();
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
  }catch(e){
    document.getElementById('loading').innerHTML=`<p style="color:#f87171;font-size:14px">データを読み込めませんでした</p>`;
  }
}

init();

function openDrawer(){
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
  buildMobileLists();
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
function syncSearch(el){
  document.getElementById('search').value=el.value;
  applyFilters();
}
function buildMobileLists(){
  // ブランドのみ（カテゴリはタブバーで選択）
  const src=selCats.size?ALL.filter(p=>selCats.has(p.type)):ALL;
  const brands=[...new Set(src.map(p=>p.brand).filter(Boolean))].sort();
  const bel=document.getElementById('brand-list-mobile');bel.innerHTML='';
  brands.forEach(brand=>{
    const cnt=src.filter(p=>p.brand===brand).length;
    const lbl=document.createElement('label');
    lbl.className='f-item'+(selBrands.has(brand)?' active':'');
    lbl.innerHTML=`<input type="checkbox" class="f-cb" ${selBrands.has(brand)?'checked':''} onchange="toggleBrand(this.parentElement.dataset.brand,this);buildMobileLists()"><span class="f-label">${esc(brand)}</span><span class="f-count">${cnt}</span>`;
    lbl.dataset.brand=brand;
    bel.appendChild(lbl);
  });
  // 件数バッジ
  const total=selCats.size+selBrands.size;
  document.getElementById('filter-badge').textContent=total?`${total}件選択中`:'';
  document.getElementById('drawer-count').textContent=getFiltered().length;
}
