<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>商品データ検索 — PANDORA</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f9faf6;--text:#1a1a1a;--border:#e5e7e0;--accent:#c8f03c;--accent-dark:#4a7a00;--accent2:#b8de2c;--muted:#888;--muted2:#555;--s2:#f0f2eb;--qc:#0284c7}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:inherit;text-decoration:none}
nav{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:58px;display:flex;align-items:center;gap:16px;overflow-x:auto}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;color:var(--accent-dark);flex-shrink:0}
.nav-link{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);padding:6px 12px;border-radius:6px;border:1px solid var(--border);white-space:nowrap;flex-shrink:0}
.nav-link:hover{color:var(--accent-dark);border-color:rgba(74,122,0,.25)}
.nav-link.active{color:var(--accent-dark);border-color:rgba(74,122,0,.4);background:rgba(74,122,0,.07)}
.nav-luxury{color:#d4af37!important;border-color:rgba(212,175,55,.35)!important}

.wrap{max-width:680px;margin:0 auto;padding:40px 20px 80px}
h1{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:var(--accent-dark);margin-bottom:6px}
.subtitle{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.6}

.search-box{display:flex;gap:8px;margin-bottom:10px}
.search-input{
  flex:1;border:2px solid var(--border);border-radius:10px;padding:13px 16px;
  font-size:14px;font-family:inherit;background:#fff;outline:none;
  transition:border-color .15s;min-width:0
}
.search-input:focus{border-color:var(--accent-dark)}
.search-input::placeholder{color:var(--muted)}
.search-btn{
  background:var(--accent);color:#111;font-family:'Bebas Neue',sans-serif;
  font-size:17px;letter-spacing:1.5px;padding:13px 22px;
  border:none;border-radius:10px;cursor:pointer;white-space:nowrap;
  transition:background .15s;flex-shrink:0
}
.search-btn:hover{background:var(--accent2)}
.search-btn:active{transform:scale(.97)}

.hint{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:32px}
.hint strong{color:var(--muted2)}
.hint code{background:var(--s2);padding:1px 5px;border-radius:4px;font-size:11px;font-family:monospace}

/* ─── 商品カード ─── */
#result{display:flex;flex-direction:column;gap:16px}
.product-card{
  background:#fff;border:1px solid var(--border);border-radius:14px;
  overflow:hidden;display:flex;flex-direction:column
}
@media(min-width:500px){.product-card{flex-direction:row}}
.product-img{width:100%;aspect-ratio:1/1;object-fit:cover;background:var(--s2)}
@media(min-width:500px){.product-img{width:190px;height:190px;flex-shrink:0}}
.product-noimag{
  width:100%;aspect-ratio:1/1;background:var(--s2);display:flex;
  align-items:center;justify-content:center;font-size:10px;
  letter-spacing:1px;color:var(--muted);text-transform:uppercase;font-weight:700
}
@media(min-width:500px){.product-noimag{width:190px;height:190px;flex-shrink:0}}
.product-body{padding:20px 22px;flex:1;display:flex;flex-direction:column;gap:10px}
.result-tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;padding:3px 8px;border-radius:999px;border:1px solid var(--border)}
.tag-brand{background:rgba(74,122,0,.08);color:var(--accent-dark);border-color:rgba(74,122,0,.2)}
.tag-type{background:rgba(0,0,0,.05);color:var(--muted2);border-color:rgba(0,0,0,.09)}
.result-title{font-size:13px;font-weight:600;color:var(--muted2);line-height:1.5}
.result-price{font-size:20px;font-weight:800;color:var(--accent-dark);display:flex;align-items:baseline;gap:6px}
.result-price-cny{font-size:12px;font-weight:600;color:var(--muted)}
.weight-block{
  display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;
  background:rgba(74,122,0,.07);border:1px solid rgba(74,122,0,.18);
  border-radius:9px;padding:10px 14px;color:var(--accent-dark)
}
.weight-na{font-size:12px;color:var(--muted);background:var(--s2);border-radius:9px;padding:10px 14px}
.product-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:auto;padding-top:2px}
.btn-buy{
  font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.5px;
  color:#111;background:var(--accent);padding:10px 18px;border-radius:8px;transition:background .15s
}
.btn-buy:hover{background:var(--accent2)}
.btn-acbuy{
  font-size:12px;font-weight:700;color:var(--qc);
  background:rgba(2,132,199,.08);border:1px solid rgba(2,132,199,.22);
  padding:10px 14px;border-radius:8px
}

/* ─── エージェントリンクカード ─── */
.agents-card{
  background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden
}
.agents-header{
  padding:14px 20px;border-bottom:1px solid var(--border);
  font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2)
}
.agent-row{
  display:flex;align-items:center;gap:14px;padding:13px 20px;
  border-bottom:1px solid var(--border);transition:background .1s
}
.agent-row:last-child{border-bottom:none}
.agent-row:hover{background:var(--s2)}
.agent-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.agent-name{font-size:14px;font-weight:700;min-width:86px;color:var(--text)}
.agent-url{flex:1;font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace}
.agent-actions{display:flex;gap:6px;flex-shrink:0}
.btn-open{
  font-size:12px;font-weight:700;color:#111;background:var(--accent);
  padding:6px 13px;border-radius:7px;border:none;cursor:pointer;transition:background .15s
}
.btn-open:hover{background:var(--accent2)}
.btn-copy{
  font-size:12px;font-weight:700;color:var(--muted2);
  background:transparent;border:1px solid var(--border);
  padding:6px 13px;border-radius:7px;cursor:pointer;transition:all .15s;font-family:inherit
}
.btn-copy:hover{background:var(--s2)}
.btn-copy.copied{border-color:var(--accent-dark);color:var(--accent-dark)}

/* ─── 状態 ─── */
.err{background:#fff3f3;border:1px solid #fca5a5;color:#b91c1c;border-radius:10px;padding:16px 20px;font-size:14px;line-height:1.6}
.loading{text-align:center;color:var(--muted);padding:40px 0;font-size:14px}
@media(max-width:500px){.agent-url{display:none}.agent-name{flex:1;min-width:unset}}

footer{text-align:center;padding:24px;font-size:11px;color:var(--muted);letter-spacing:1px}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="/">PANDORA</a>
    <a class="nav-link" href="/catalog.html">全商品</a>
    <a class="nav-link nav-luxury" href="/luxury/">LUXURY</a>
    <a class="nav-link active" href="/search.html">商品データ検索</a>
    <a class="nav-link" href="https://www.kakobuy.com/?affcode=a235412" target="_blank" rel="noopener">Kakobuy</a>
  </div>
</nav>

<div class="wrap">
  <h1>商品データ検索</h1>
  <p class="subtitle">商品URLを貼り付けると、重量・価格・体積の詳細と各エージェントの購入リンクを表示します。</p>

  <div class="search-box">
    <input class="search-input" id="url-input" type="url"
      placeholder="Yupoo / Weidian / Taobao / Kakobuy の URL を貼り付けてください"
      autocomplete="off" spellcheck="false">
    <button class="search-btn" onclick="doSearch()">検索</button>
  </div>
  <div class="hint">
    <strong>対応URL：</strong>
    Yupoo <code>yupoo.com/albums/...</code>、
    Weidian <code>weidian.com/item.html?itemID=...</code>、
    Taobao <code>item.taobao.com/item.htm?id=...</code>、
    Kakobuy <code>kakobuy.com/products/item?itemId=...</code>
  </div>

  <div id="result"></div>
</div>

<footer>PANDORA &nbsp;·&nbsp; <a href="https://www.kakobuy.com/?affcode=a235412" target="_blank" rel="noopener">Kakobuyで購入</a></footer>

<script>
const CAT_JA = {
  SNEAKERS:"スニーカー", CLOTHING:"ウェア", BAGS:"バッグ", BELTS:"ベルト",
  ACCESSORIES:"アクセサリー", CAPS:"キャップ", SHOES:"シューズ",
  WATCHES:"ウォッチ", JEWELRY:"ジュエリー", OTHER:"その他"
};

// row: [title, brand, type, image, price_cny, price_jpy, weight_g, volume_cm, kakobuy, purchase]
const T=0,B=1,C=2,IMG=3,PC=4,PJ=5,W=6,V=7,KK=8,PU=9;

const AGENTS = [
  { name:"Kakobuy",  color:"#4ade80", build:(u)=>`https://www.kakobuy.com/item/details?url=${enc(u)}&affcode=a235412` },
  { name:"Superbuy", color:"#60a5fa", build:(u)=>`https://www.superbuy.com/en/page/buy/?url=${enc(u)}` },
  { name:"Wegobuy",  color:"#f472b6", build:(u)=>`https://www.wegobuy.com/en/page/buy/?url=${enc(u)}` },
  { name:"Sugargoo", color:"#fb923c", build:(u)=>`https://www.sugargoo.com/#/home/productDetail?productLink=${enc(u)}` },
];

function enc(u){ return encodeURIComponent(u); }

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let lookupData = null;
async function loadLookup(){
  if (lookupData) return lookupData;
  const r = await fetch('/product-lookup.json');
  if (!r.ok) throw new Error('fetch failed');
  lookupData = await r.json();
  return lookupData;
}

// URLから Yupoo album ID または platform item ID を取り出す
function extractId(raw){
  const url = raw.trim();
  const alb = url.match(/\/albums?\/(\d+)/);
  if (alb) return { type:'a', id:alb[1] };
  try {
    const u = new URL(url);
    const h = u.hostname.toLowerCase();
    const p = u.searchParams;
    if (h.includes('kakobuy.com')){ const id=p.get('itemId'); if(id) return{type:'i',id}; }
    if (h.includes('weidian.com')){ const id=p.get('itemID')||p.get('id'); if(id) return{type:'i',id}; }
    if (h.includes('taobao.com')||h.includes('tmall.com')){ const id=p.get('id'); if(id) return{type:'i',id}; }
  } catch {}
  return null;
}

// 購入可能な元URL（Weidian/Taobao）を抽出
function extractPurchaseUrl(raw){
  const r = raw.trim();
  // Kakobuy の url= パラメータから取り出す
  try {
    const u = new URL(r);
    if (u.hostname.includes('kakobuy.com')){
      const inner = u.searchParams.get('url');
      if (inner) return decodeURIComponent(inner);
    }
    const h = u.hostname.toLowerCase();
    if (h.includes('weidian.com') || h.includes('taobao.com') || h.includes('tmall.com')) return r;
  } catch {}
  // Yupoo の場合は purchase URL を DB から取得
  return null;
}

function buildAcbuyUrl(purchase){
  if (!purchase) return null;
  try {
    const u = new URL(purchase);
    const h = u.hostname.toLowerCase();
    const p = u.searchParams;
    if (h.includes('weidian.com')){ const id=p.get('itemID')||p.get('id'); if(id) return`https://www.acbuy.com/product?url=${enc(purchase)}&id=${id}&source=WD`; }
    if (h.includes('taobao.com')||h.includes('tmall.com')){ const id=p.get('id'); if(id) return`https://www.acbuy.com/product?url=${enc(purchase)}&id=${id}&source=TB`; }
  } catch {}
  return null;
}

async function copyText(text, btn){
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = 'コピー済 ✓';
    btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='コピー'; btn.classList.remove('copied'); }, 1800);
  } catch { btn.textContent='Error'; }
}

function renderProductCard(row){
  const catJa = CAT_JA[row[C]] || row[C] || '';
  const imgHtml = row[IMG]
    ? `<img class="product-img" src="${esc(row[IMG])}" alt="${esc(row[T])}" loading="lazy">`
    : `<div class="product-noimag">NO IMAGE</div>`;

  let priceHtml = '';
  if (row[PJ]){
    const cnyPart = row[PC] ? `<span class="result-price-cny">/ ¥${esc(row[PC])} CNY</span>` : '';
    priceHtml = `<div class="result-price">¥${Number(row[PJ]).toLocaleString('ja-JP')}${cnyPart}</div>`;
  } else if (row[PC]) {
    priceHtml = `<div class="result-price"><span class="result-price-cny">¥${esc(row[PC])} CNY</span></div>`;
  }

  let weightHtml;
  if (row[W]){
    const vol = row[V] ? ` <span style="font-weight:400;color:var(--muted2)">· ${String(row[V]).replace(/\*/g,'×')} cm</span>` : '';
    weightHtml = `<div class="weight-block">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M12 2a4 4 0 0 1 4 4H8a4 4 0 0 1 4-4z"/>
        <rect x="3" y="6" width="18" height="15" rx="2"/>
      </svg>${esc(row[W])}g${vol}</div>`;
  } else {
    const pu = row[PU] || row[KK];
    const acUrl = buildAcbuyUrl(pu);
    const acLink = acUrl
      ? ` <a href="${esc(acUrl)}" target="_blank" rel="noopener" style="color:var(--qc);text-decoration:underline;text-underline-offset:2px">ACbuyで確認</a>`
      : '';
    weightHtml = `<div class="weight-na">重量データは未取得です。${acLink}</div>`;
  }

  const kakobuy = row[KK] || row[PU];
  const buyBtn = kakobuy ? `<a class="btn-buy" href="${esc(kakobuy)}" target="_blank" rel="noopener">Kakobuyで見る →</a>` : '';
  const acUrl  = buildAcbuyUrl(row[PU]);
  const acBtn  = acUrl   ? `<a class="btn-acbuy" href="${esc(acUrl)}" target="_blank" rel="noopener">ACbuyで確認</a>` : '';

  return `<div class="product-card">
  ${imgHtml}
  <div class="product-body">
    <div class="result-tags">
      ${row[B] ? `<span class="tag tag-brand">${esc(row[B])}</span>` : ''}
      ${catJa  ? `<span class="tag tag-type">${esc(catJa)}</span>`  : ''}
    </div>
    <div class="result-title">${esc(row[T])}</div>
    ${priceHtml}
    ${weightHtml}
    <div class="product-actions">${buyBtn}${acBtn}</div>
  </div>
</div>`;
}

function renderAgentLinks(purchaseUrl){
  if (!purchaseUrl) return '';
  const rows = AGENTS.map(ag => {
    const link = ag.build(purchaseUrl);
    return `<div class="agent-row">
      <div class="agent-dot" style="background:${ag.color}"></div>
      <span class="agent-name">${ag.name}</span>
      <span class="agent-url">${esc(link)}</span>
      <div class="agent-actions">
        <button class="btn-open" onclick="window.open('${esc(link)}','_blank')">開く</button>
        <button class="btn-copy" onclick="copyText('${link.replace(/'/g,"\\'")}',this)">コピー</button>
      </div>
    </div>`;
  }).join('');

  return `<div class="agents-card">
  <div class="agents-header">購入エージェントリンク</div>
  ${rows}
</div>`;
}

async function doSearch(){
  const input = document.getElementById('url-input').value.trim();
  const out   = document.getElementById('result');
  if (!input) return;

  // 直接購入URLかどうか
  const directPurchaseUrl = extractPurchaseUrl(input);

  const key = extractId(input);
  if (!key && !directPurchaseUrl){
    out.innerHTML = `<div class="err">対応していないURLです。<br>Yupoo・Weidian・Taobao・KakobuyのURLを入力してください。</div>`;
    return;
  }

  out.innerHTML = `<div class="loading">検索中…</div>`;

  let productHtml = '';
  let agentPurchaseUrl = directPurchaseUrl;

  if (key){
    try {
      const data = await loadLookup();
      const row  = (data[key.type] || {})[key.id];
      if (row){
        productHtml = renderProductCard(row);
        // 商品DBから購入URLを補完
        if (!agentPurchaseUrl){
          agentPurchaseUrl = row[PU] || null;
        }
      }
    } catch {
      // ルックアップ失敗は無視してエージェントリンクだけ表示
    }
  }

  const agentsHtml = renderAgentLinks(agentPurchaseUrl);

  if (!productHtml && !agentsHtml){
    out.innerHTML = `<div class="err">商品が見つかりませんでした。<br><small style="opacity:.7">このサイトに掲載されていない商品の可能性があります。</small></div>`;
    return;
  }

  out.innerHTML = productHtml + agentsHtml;
}

document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
document.getElementById('url-input').addEventListener('paste', () => {
  setTimeout(doSearch, 60);
});

// ?q=<url> で直接検索
(function(){
  const q = new URLSearchParams(location.search).get('q');
  if (q){ document.getElementById('url-input').value = q; doSearch(); }
})();
</script>
</body>
</html>
