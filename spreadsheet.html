<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spreadsheet — Kakobuy Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--s1:#111;--s2:#161616;--s3:#1e1e1e;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.15);--text:#f0f0f0;--muted:#555;--muted2:#888;--accent:#c8f03c;--accent2:#9fc02a;--qc:#38bdf8}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
nav{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--accent);text-decoration:none}
.nav-links{display:flex;gap:24px}
.nav-links a{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);text-decoration:none;transition:color .15s}
.nav-links a:hover,.nav-links a.active{color:var(--accent)}
.filter-wrap{position:sticky;top:56px;z-index:99;background:rgba(17,17,17,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
.filter-row{display:flex;flex-wrap:wrap;gap:7px;align-items:center;padding:10px 24px}
.filter-row+.filter-row{border-top:1px solid var(--border);padding-top:8px;padding-bottom:8px;min-height:38px}
.row-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-right:4px;white-space:nowrap;flex-shrink:0}
.chip{padding:4px 13px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted2);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .12s;white-space:nowrap}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.active{background:var(--accent);color:#0a0a0a;border-color:var(--accent)}
.chip.brand-active{background:rgba(200,240,60,.13);color:#a8d030;border-color:rgba(200,240,60,.35)}
.count{margin-left:auto;font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.search-wrap{position:relative}
.search-wrap input{background:var(--s3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;padding:7px 12px 7px 32px;outline:none;width:190px;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none}
main{position:relative;z-index:1;padding:20px 24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.card{background:var(--s1);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s,transform .15s}
.card:hover{border-color:var(--border2);transform:translateY(-2px)}
.card-img{width:100%;aspect-ratio:4/3;object-fit:cover;background:var(--s2);display:block;flex-shrink:0}
.card-noimag{width:100%;aspect-ratio:4/3;background:var(--s2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-noimag span{font-size:11px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
.card-body{padding:11px;flex:1;display:flex;flex-direction:column;gap:7px}
.brand-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 8px;border-radius:999px;background:rgba(200,240,60,.1);color:#a8d030;border:1px solid rgba(200,240,60,.2);width:fit-content}
.card-title{font-size:12px;font-weight:700;color:var(--text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.card-price{font-size:14px;font-weight:700;color:var(--accent);letter-spacing:.5px}
.card-actions{display:flex;gap:6px;align-items:center}
.btn-buy{flex:1;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.5px;color:#0a0a0a;background:var(--accent);padding:7px 10px;border-radius:7px;text-decoration:none;transition:background .15s;display:block}
.btn-buy:hover{background:var(--accent2)}
.btn-qc{display:flex;align-items:center;justify-content:center;gap:4px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--qc);background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.25);padding:7px 10px;border-radius:7px;text-decoration:none;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn-qc:hover{background:rgba(56,189,248,.2);border-color:rgba(56,189,248,.5)}
.btn-qc svg{width:12px;height:12px;flex-shrink:0}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;position:relative;z-index:1}
.spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:13px;color:var(--muted);letter-spacing:1px}
.updated-bar{text-align:center;padding:6px;font-size:11px;color:var(--muted);background:var(--s1);border-bottom:1px solid var(--border);position:relative;z-index:1}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card{animation:fadeIn .18s ease both}
@media(max-width:640px){nav{padding:0 16px}.filter-row{padding:8px 16px}main{padding:14px 16px}.grid{grid-template-columns:repeat(2,1fr);gap:8px}.nav-links{display:none}.search-wrap input{width:130px}}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">KAKOBUY</a>
  <div class="nav-links">
    <a href="/spreadsheet.html" class="active">Spreadsheet</a>
    <a href="/index.html">Link Converter</a>
    <a href="/shipping.html">Shipping Calc</a>
  </div>
</nav>

<div id="loading"><div class="spinner"></div><p>Loading catalog...</p></div>

<div id="app" style="display:none">
  <div class="updated-bar" id="updated-bar"></div>
  <div class="filter-wrap">
    <div class="filter-row">
      <span class="row-label">Category</span>
      <div id="cat-chips" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      <div class="search-wrap" style="margin-left:auto">
        <input id="search" type="text" placeholder="Search..." oninput="applyFilters()">
      </div>
      <span class="count" id="count"></span>
    </div>
    <div class="filter-row" id="brand-row" style="display:none">
      <span class="row-label">Brand</span>
      <div id="brand-chips" style="display:flex;gap:6px;flex-wrap:wrap"></div>
    </div>
  </div>
  <main><div class="grid" id="grid"></div></main>
</div>

<script>
const F={cat:'all',brand:'all',q:''};
let ALL=[];

function cleanTitle(raw){
  let s=String(raw).trim();
  s=s.replace(/^(ON SALE\s*)?[¥￥][\d,.\s]+(cny|CNY|usd|USD)?\s*/i,'');
  s=s.replace(/\s+[A-Z]{0,4}[-]?\d{2,5}[#\s]*$/g,'');
  s=s.replace(/[\u4e00-\u9fff\u3400-\u4dbf]{2,}[^\u0000-\u007f]*/g,'');
  return s.replace(/\s{2,}/g,' ').replace(/[-\s]+$/,'').trim()||raw.slice(0,50);
}

function extractJPY(p){
  // products.json の price_jpy / jpy フィールド優先
  const j=p.price_jpy||p.jpy;
  if(j&&String(j).trim()&&String(j).trim()!=='undefined'&&String(j).trim()!=='null'){
    const n=parseInt(String(j).replace(/[^0-9]/g,''));
    if(!isNaN(n))return'¥'+n.toLocaleString()+' JPY';
  }
  // タイトルのCNY → JPY概算（1 CNY ≈ 21 JPY）
  const m=String(p.title||'').match(/[¥￥]([\d,]+)\s*cny/i);
  if(m){const n=Math.round(parseInt(m[1].replace(',',''))*21);return'¥'+n.toLocaleString()+' JPY'}
  return'';
}

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function makeChip(label,active,onClick,isBrand=false){
  const b=document.createElement('button');
  b.className='chip'+(active?(isBrand?' brand-active':' active'):'');
  b.textContent=label;b.onclick=onClick;return b;
}

function buildCatChips(products){
  const cats=[...new Set(products.map(p=>p.type).filter(Boolean))].sort();
  const el=document.getElementById('cat-chips');
  const allBtn=makeChip('All',true,()=>{
    F.cat='all';F.brand='all';
    el.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
    allBtn.classList.add('active');
    document.getElementById('brand-row').style.display='none';
    document.getElementById('brand-chips').innerHTML='';
    applyFilters();
  });
  el.appendChild(allBtn);
  cats.forEach(cat=>{
    const btn=makeChip(cat,false,()=>{
      F.cat=cat;F.brand='all';
      el.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      buildBrandChips(cat);
      applyFilters();
    });
    el.appendChild(btn);
  });
}

function buildBrandChips(cat){
  const brands=[...new Set(ALL.filter(p=>p.type===cat).map(p=>p.seller).filter(Boolean))].sort();
  const el=document.getElementById('brand-chips');
  el.innerHTML='';
  const allBtn=makeChip('All brands',true,()=>{
    F.brand='all';
    el.querySelectorAll('.chip').forEach(b=>b.classList.remove('brand-active'));
    allBtn.classList.add('brand-active');
    applyFilters();
  },true);
  el.appendChild(allBtn);
  brands.forEach(brand=>{
    const btn=makeChip(brand,false,()=>{
      F.brand=brand;
      el.querySelectorAll('.chip').forEach(b=>b.classList.remove('brand-active'));
      btn.classList.add('brand-active');
      applyFilters();
    },true);
    el.appendChild(btn);
  });
  document.getElementById('brand-row').style.display='flex';
}

function applyFilters(){
  F.q=document.getElementById('search').value.toLowerCase();
  const items=ALL.filter(p=>{
    if(F.cat!=='all'&&p.type!==F.cat)return false;
    if(F.brand!=='all'&&p.seller!==F.brand)return false;
    if(F.q&&!(p.title+' '+p.type+' '+p.seller).toLowerCase().includes(F.q))return false;
    return true;
  });
  document.getElementById('count').textContent=items.length+' items';
  renderGrid(items);
}

function renderGrid(products){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  if(!products.length){grid.innerHTML='<div class="empty">No products found.</div>';return}
  products.forEach((p,i)=>{
    const title=cleanTitle(p.title);
    const price=extractJPY(p);
    const buyLink=p.kakobuy||p.purchase||'#';
    const qcLink=p.yupoo||'#';
    const card=document.createElement('div');
    card.className='card';
    card.style.animationDelay=Math.min(i,24)*.018+'s';
    const imgHtml=p.image
      ?`<img class="card-img" src="${esc(p.image)}" alt="${esc(title)}" loading="lazy" onerror="this.outerHTML='<div class=card-noimag><span>No Image</span></div>'">`
      :`<div class="card-noimag"><span>No Image</span></div>`;
    card.innerHTML=`
      ${imgHtml}
      <div class="card-body">
        ${p.seller?`<div class="brand-tag">${esc(p.seller)}</div>`:''}
        <div class="card-title">${esc(title)}</div>
        ${price?`<div class="card-price">${price}</div>`:''}
        <div class="card-actions">
          <a class="btn-buy" href="${esc(buyLink)}" target="_blank" rel="noopener">購入する</a>
          <a class="btn-qc"  href="${esc(qcLink)}"  target="_blank" rel="noopener">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="6.5" cy="6.5" r="4.5"/>
              <line x1="10" y1="10" x2="14" y2="14"/>
            </svg>
            QC
          </a>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

async function init(){
  try{
    const res=await fetch('./products.json');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    ALL=data.products||[];
    if(data.updated){
      const d=new Date(data.updated);
      document.getElementById('updated-bar').textContent=
        `Last updated: ${d.toLocaleDateString('ja-JP')} · ${ALL.length} products`;
    }
    buildCatChips(ALL);
    applyFilters();
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
  }catch(err){
    document.getElementById('loading').innerHTML=`
      <p style="color:#f87171;font-size:14px">products.json を読み込めませんでした</p>
      <p style="color:var(--muted);font-size:12px;margin-top:8px">同じフォルダに products.json があるか確認してください。</p>`;
  }
}
init();
</script>
</body>
</html>
